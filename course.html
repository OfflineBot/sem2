<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kurs · 2. Semester</title>
    <link rel="stylesheet" href="./assets/style.css?v=9">
</head>
<body class="course-page">
    <header class="topbar">
        <button id="sidebar-toggle" class="topbar-btn hamburger" type="button" aria-label="Menü">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">
            <span id="course-title">…</span>
            <span class="topbar-sep" id="topbar-sep" hidden>·</span>
            <span id="topbar-file" class="topbar-file"></span>
        </div>
        <div class="topbar-actions">
            <button id="fullscreen-btn" class="topbar-btn" type="button" aria-label="Vollbild" title="Vollbild">⛶</button>
            <a id="download-btn" class="topbar-btn" download aria-label="Runterladen" title="Runterladen" hidden>↓</a>
        </div>
    </header>
    <main class="pdf-main">
        <div id="status" class="status"></div>
        <section id="viewer" class="viewer"></section>
    </main>
    <aside id="file-controls" class="sidebar">
        <a class="sidebar-back" href="./index.html">← Alle Kurse</a>
        <div class="sidebar-section">
            <div class="sidebar-label">Kategorien</div>
            <nav id="tabs" class="sidebar-tabs"></nav>
        </div>
        <div class="sidebar-section sidebar-section-grow">
            <div class="sidebar-label" id="files-label">Dateien</div>
            <div id="file-pills" class="sidebar-pills"></div>
        </div>
    </aside>
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    <script src="./assets/app.js?v=9"></script>
    <script>renderCourse();</script>
</body>
</html>
